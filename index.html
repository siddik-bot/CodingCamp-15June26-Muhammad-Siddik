<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Life Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
  <script>
    /* Apply dark mode before paint to prevent flash (Req 11.4) */
    (function () {
      try {
        if (localStorage.getItem("darkMode") === "true") {
          document.documentElement.classList.add("dark");
          document.body && document.body.classList.add("dark");
        }
      } catch (e) {}
    })();
  </script>
</head>
<body>

  <div class="container">

    <!-- GREETING WIDGET — full width top -->
    <div class="card card--greeting">
      <p id="clock">--:--:--</p>
      <p id="date">Date unavailable</p>
      <h1 id="greeting">Hello</h1>
    </div>

    <!-- FOCUS TIMER -->
    <div class="card card--timer">
      <h2>Focus Timer</h2>
      <div id="timerDisplay" class="timer-display">25:00</div>
      <p id="timerNotification" class="timer-notification" aria-live="polite"></p>
      <div class="timer-controls">
        <button id="startBtn" onclick="startTimer()">Start</button>
        <button id="stopBtn" onclick="stopTimer()" disabled>Stop</button>
        <button id="resetBtn" onclick="resetTimer()" disabled>Reset</button>
      </div>
    </div>

    <!-- TASKS -->
    <div class="card card--tasks">
      <h2>Tasks</h2>
      <div class="task-input-row">
        <input
          id="taskInput"
          type="text"
          placeholder="Add a new task..."
          maxlength="200"
          aria-label="New task title">
        <button onclick="addTask()">Add</button>
      </div>
      <p id="taskError" class="error-msg" aria-live="polite"></p>
      <ul id="taskList"></ul>
    </div>

    <!-- QUICK LINKS -->
    <div class="card card--links">
      <h2>Quick Links</h2>
      <div class="link-input-group">
        <input
          id="linkLabel"
          type="text"
          placeholder="Link name"
          maxlength="50"
          aria-label="Link label">
        <input
          id="linkUrl"
          type="text"
          placeholder="URL"
          maxlength="2048"
          aria-label="Link URL">
        <button onclick="addLink()">Add Link</button>
      </div>
      <p id="linkError" class="error-msg" aria-live="polite"></p>
      <div id="linkList" class="link-pills"></div>
    </div>

    <!-- DARK MODE TOGGLE -->
    <div class="darkmode-row">
      <button id="darkModeBtn" onclick="toggleDarkMode()">Switch to Dark Mode</button>
    </div>

  </div>

  <script src="js/script.js"></script>
</body>
</html>
